<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Aura glow -->
  <ellipse cx="512" cy="560" rx="380" ry="340" fill="url(#aura)"/>

  <!-- Cake body -->
  <g transform="translate(512, 540)" filter="url(#shadow)">
    <!-- Bottom tier -->
    <rect x="-200" y="60" width="400" height="160" rx="24" fill="#fb7185"/>
    <rect x="-200" y="60" width="400" height="40" rx="16" fill="#fda4b5"/>

    <!-- Top tier -->
    <rect x="-145" y="-60" width="290" height="130" rx="20" fill="#f43f5e"/>
    <rect x="-145" y="-60" width="290" height="35" rx="14" fill="#fb7185"/>

    <!-- Frosting drips bottom -->
    <path d="M-200,95 Q-180,75 -160,95 Q-140,115 -120,95 Q-100,75 -80,95 Q-60,115 -40,95 Q-20,75 0,95 Q20,115 40,95 Q60,75 80,95 Q100,115 120,95 Q140,75 160,95 Q180,115 200,95" fill="none" stroke="#fff" stroke-width="8" stroke-opacity="0.3"/>

    <!-- Frosting drips top -->
    <path d="M-145,-28 Q-125,-48 -105,-28 Q-85,-8 -65,-28 Q-45,-48 -25,-28 Q-5,-8 15,-28 Q35,-48 55,-28 Q75,-8 95,-28 Q115,-48 135,-28" fill="none" stroke="#fff" stroke-width="6" stroke-opacity="0.3"/>

    <!-- Candles -->
    <rect x="-60" y="-140" width="20" height="90" rx="8" fill="#fbbf24"/>
    <rect x="-10" y="-155" width="20" height="105" rx="8" fill="#a78bfa"/>
    <rect x="40" y="-135" width="20" height="85" rx="8" fill="#34d399"/>

    <!-- Stars decoration -->
    <circle cx="-110" cy="130" r="8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="110" cy="145" r="6" fill="#38bdf8" opacity="0.8"/>
    <circle cx="0" cy="20" r="5" fill="#fff" opacity="0.5"/>
    <circle cx="-80" cy="15" r="4" fill="#fda4b5" opacity="0.6"/>
    <circle cx="85" cy="10" r="4" fill="#a5f3fc" opacity="0.6"/>
  </g>

  <!-- Flames on candles -->
  <!-- Flame 1 -->
  <ellipse cx="452" cy="370" rx="14" ry="22" fill="#fbbf24" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="452" cy="362" rx="8" ry="14" fill="#fff7ed"/>
  <!-- Flame 2 -->
  <ellipse cx="502" cy="353" rx="14" ry="24" fill="#f97316" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="502" cy="344" rx="8" ry="15" fill="#fff7ed"/>
  <!-- Flame 3 -->
  <ellipse cx="552" cy="374" rx="13" ry="21" fill="#fbbf24" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="552" cy="366" rx="7" ry="13" fill="#fff7ed"/>

  <!-- Sparkles -->
  <g fill="#38bdf8" opacity="0.9">
    <polygon points="320,280 328,300 348,300 333,312 338,332 320,320 302,332 307,312 292,300 312,300" transform="scale(0.6) translate(220,200)"/>
    <polygon points="700,320 706,336 722,336 710,345 715,361 700,352 685,361 690,345 678,336 694,336" transform="scale(0.5) translate(740,240)"/>
  </g>
  <g fill="#fbbf24" opacity="0.8">
    <polygon points="280,450 285,464 299,464 288,472 292,486 280,478 268,486 272,472 261,464 275,464" transform="scale(0.45) translate(340,460)"/>
    <polygon points="750,460 754,471 765,471 756,478 759,490 750,483 741,490 744,478 735,471 746,471" transform="scale(0.4) translate(1140,520)"/>
  </g>
</svg>
